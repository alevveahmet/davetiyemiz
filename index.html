<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alev & Ahmet Davetiye</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alevveahmet.github.io/davetiye/">
    <meta property="og:title" content="Alev & Ahmet Davetiye">
    <meta property="og:description" content="Mutluluğumuza ortak olmanız dileğiyle...">
    <meta property="og:image" content="https://alevveahmet.github.io/davetiye/1.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        body { margin: 0; padding: 0; background-color: #fdfaf6; font-family: 'Georgia', serif; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.05); }

        .img-wrapper { width: 100%; min-height: 400px; overflow: hidden; line-height: 0; background-color: #fdfaf6; }
        
        img { 
            width: 100%; height: auto; display: block;
            opacity: 0; filter: blur(15px); transform: scale(1.05); 
            transition: all 1.5s ease-out; 
        }

        img.is-visible { opacity: 1; filter: blur(0); transform: scale(1); }

        /* GERİ SAYIM STİLİ */
        .countdown-section { padding: 40px 20px; text-align: center; background: #fff; border-top: 1px dashed #eee; }
        .countdown-title { color: #8a7352; font-style: italic; font-size: 18px; margin-bottom: 20px; }
        .countdown-timer { display: flex; justify-content: center; gap: 15px; }
        .time-box { background: #fdfaf6; padding: 10px; border-radius: 8px; min-width: 60px; border: 1px solid #f2ede4; }
        .time-number { display: block; font-size: 24px; color: #8a7352; font-weight: bold; }
        .time-label { font-size: 10px; color: #a5937d; text-transform: uppercase; letter-spacing: 1px; }

        .footer { padding: 20px 20px 60px; text-align: center; background: #fff; }
        .map-container { width: 90%; margin: 20px auto 30px; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-konum {
            display: inline-block; padding: 18px 40px; border: 1px solid #8a7352; color: #8a7352;
            text-decoration: none; letter-spacing: 2px; font-size: 13px;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-konum:hover { background: #8a7352; color: #fff; }

        #music-control {
            position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; border-radius: 50%;
            background: rgba(138, 115, 82, 0.9); color: white;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000; border: none; font-size: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <audio id="myAudio" loop><source src="muzik.mp3" type="audio/mpeg"></audio>
    <button id="music-control" onclick="toggleMusic()">🎵</button>

    <div class="container">
        <div class="img-wrapper"><img src="1.jpg" alt="Alev Ahmet Davetiye 1"></div>
        <div class="img-wrapper"><img src="2.jpg" alt="Alev Ahmet Davetiye 2"></div>

        <div class="countdown-section">
            <div class="countdown-title">Mutluluğa Kalan Zaman</div>
            <div class="countdown-timer" id="timer">
                <div class="time-box"><span class="time-number" id="days">00</span><span class="time-label">Gün</span></div>
                <div class="time-box"><span class="time-number" id="hours">00</span><span class="time-label">Saat</span></div>
                <div class="time-box"><span class="time-number" id="minutes">00</span><span class="time-label">Dakika</span></div>
                <div class="time-box"><span class="time-number" id="seconds">00</span><span class="time-label">Saniye</span></div>
            </div>
        </div>

        <div class="footer">
            <p style="color: #a5937d; font-style: italic; margin-bottom: 20px;">Nikah Konumu</p>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3580.2540583814734!2d28.649142529690852!3d41.01162842473035!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14b55f0ad1846df3%3A0xacf52a7d7a833dd0!2sBeylikd%C3%BCz%C3%BC%20Belediyesi%20Nikah%20Salonu%20-%20Beylicium%20AVM!5e0!3m2!1str!2str!4v1776259327707!5m2!1str!2str" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <a href="https://maps.app.goo.gl/LDy8pzR9owTv4LZS9" target="_blank" class="btn-konum">NAVİGASYONDA AÇ (NİKAH)</a>

            <div style="margin-top: 60px;"></div>

            <p style="color: #a5937d; font-style: italic; margin-bottom: 20px;">Düğün Konumu</p>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3052.3544729223577!2d31.88719907638962!3d40.0898090754715!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14d2bc3cb0666ae9%3A0x96c0c41cffa6d253!2zQmV5cGF6YXLEsSBBcyBCYWzEsWvDp8SxbMSxaw!5e0!3m2!1str!2str!4v1776258391562!5m2!1str!2str" allowfullscreen="" loading="lazy"></iframe>
            </div>
            <a href="https://maps.app.goo.gl/HaTkH9tVSa92VPoh9" target="_blank" class="btn-konum">NAVİGASYONDA AÇ (DÜĞÜN)</a>

            <p style="margin-top: 50px; font-size: 10px; color: #bbb; letter-spacing: 3px;">ALEV & AHMET</p>
        </div>
    </div>

    <script>
        // Müzik Kontrolü
        const audio = document.getElementById("myAudio");
        const mBtn = document.getElementById("music-control");
        function toggleMusic() {
            if (audio.paused) { audio.play(); mBtn.innerText = "🎶"; }
            else { audio.pause(); mBtn.innerText = "🎵"; }
        }

        // GERİ SAYIM MANTIĞI (6 Haziran Saat 13:00)
        const countdownDate = new Date("Jun 6, 2026 13:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            const d = Math.floor(distance / (1000 * 60 * 60 * 24));
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = d < 10 ? "0"+d : d;
            document.getElementById("hours").innerHTML = h < 10 ? "0"+h : h;
            document.getElementById("minutes").innerHTML = m < 10 ? "0"+m : m;
            document.getElementById("seconds").innerHTML = s < 10 ? "0"+s : s;

            if (distance < 0) {
                clearInterval(x);
                document.querySelector(".countdown-section").innerHTML = "<div class='countdown-title'>Mutluluğumuza Hoş Geldiniz!</div>";
            }
        }, 1000);

        // Görsel Görünürlük Kontrolü
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('is-visible'); });
        }, { threshold: 0.1 });

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('img').forEach(img => { observer.observe(img); });
        });
    </script>
</body>
</html>
